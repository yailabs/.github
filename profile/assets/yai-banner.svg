<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="420" viewBox="0 0 1600 420" role="img" aria-label="YAI Labs banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#070A12"/>
      <stop offset="0.55" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#070A12"/>
    </linearGradient>

    <radialGradient id="halo" cx="25%" cy="50%" r="45%">
      <stop offset="0" stop-color="#A78BFA" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
    </radialGradient>

    <filter id="bannerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="16" stdDeviation="18" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <!-- Embed the logo as a symbol -->
    <symbol id="yaiEye" viewBox="0 0 512 512">
      <defs>
        <linearGradient id="ringGrad2" x1="120" y1="72" x2="392" y2="440" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#F3F4F6"/>
          <stop offset="0.35" stop-color="#E9D5FF"/>
          <stop offset="0.7" stop-color="#A78BFA"/>
          <stop offset="1" stop-color="#6D28D9"/>
        </linearGradient>

        <radialGradient id="irisGrad2" cx="40%" cy="35%" r="65%">
          <stop offset="0" stop-color="#D8B4FE"/>
          <stop offset="0.35" stop-color="#8B5CF6"/>
          <stop offset="0.75" stop-color="#4C1D95"/>
          <stop offset="1" stop-color="#111827"/>
        </radialGradient>

        <radialGradient id="glowGrad2" cx="50%" cy="50%" r="60%">
          <stop offset="0" stop-color="#A78BFA" stop-opacity="0.35"/>
          <stop offset="1" stop-color="#A78BFA" stop-opacity="0"/>
        </radialGradient>

        <filter id="softShadow2" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="10" stdDeviation="10" flood-color="#000000" flood-opacity="0.35"/>
        </filter>

        <filter id="microShadow2" x="-20%" y="-20%" width="140%" height="140%">
          <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000000" flood-opacity="0.35"/>
        </filter>
      </defs>

      <g filter="url(#softShadow2)">
        <circle cx="256" cy="256" r="168" fill="none" stroke="url(#ringGrad2)" stroke-width="56" stroke-linecap="round"/>
        <circle cx="256" cy="256" r="132" fill="none" stroke="#0B0F19" stroke-opacity="0.7" stroke-width="6"/>
        <circle cx="256" cy="256" r="112" fill="url(#glowGrad2)"/>
        <circle cx="256" cy="256" r="98" fill="url(#irisGrad2)" filter="url(#microShadow2)"/>
        <circle cx="256" cy="256" r="98" fill="none" stroke="#FFFFFF" stroke-opacity="0.10" stroke-width="2"/>
        <circle cx="256" cy="256" r="20" fill="#0B0F19"/>
        <path d="M214 224c18-28 47-44 78-44c10 0 20 2 28 5c-32 4-61 20-78 44c-8 11-13 23-15 36c-9-12-17-27-13-41z" fill="#FFFFFF" fill-opacity="0.12"/>
        <circle cx="226" cy="214" r="7" fill="#FFFFFF" fill-opacity="0.55"/>
      </g>
    </symbol>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="1600" height="420" fill="url(#bg)"/>
  <rect x="0" y="0" width="1600" height="420" fill="url(#halo)"/>

  <!-- Content -->
  <g filter="url(#bannerShadow)">
    <!-- Logo -->
    <use href="#yaiEye" x="120" y="70" width="280" height="280"/>

    <!-- Text block -->
    <g transform="translate(460,140)">
      <text x="0" y="0"
            fill="#F9FAFB"
            font-size="44"
            font-weight="650"
            font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
        YAI Labs
      </text>

      <text x="0" y="56"
            fill="#E5E7EB"
            font-size="20"
            font-weight="500"
            font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
        Governed runtime infrastructure for accountable execution.
      </text>

      <text x="0" y="92"
            fill="#A78BFA"
            font-size="16"
            font-weight="600"
            font-family="Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial">
        Authority-first · Deterministic gates · Audit-grade evidence
      </text>
    </g>
  </g>
</svg>
